<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DFP — Admin Home</title>

  <!-- Favicon & Styles -->
  <link rel="icon" href="../logo.png" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="../styles/buttons.css" />

  <style>
    .grid { display: grid; gap: 12px; }
    @media (min-width: 900px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
    .actions-row { display: flex; gap: 8px; flex-wrap: wrap; }
  </style>
</head>

<body class="theme-dark">

  <!-- Top Navigation -->
  <header class="topbar">
    <div class="brand">
      <img src="../logo.png" class="logo--small" alt="DFP" />
      <h1>Admin</h1>
    </div>

    <div class="actions" style="display: flex; gap: 8px; align-items: center;">
      <a class="btn btn--quiet btn--sm" href="../dashboard.html">Back to Pools</a>
      <button class="btn btn--quiet btn--sm" id="logout-btn">Logout</button>
    </div>
  </header>

  <main class="container" style="max-width:1100px;">

    <!-- Global tools -->
    <section class="card">
      <h3>Global Controls</h3>
      <p class="muted">Quick access to platform‑wide tools.</p>

      <div class="actions-row">
        <a class="btn btn--ghost btn--sm" href="./locks.html">Locks (All Pools)</a>
        <a class="btn btn--ghost btn--sm" href="./teams.html">Teams (All Pools)</a>
      </div>
    </section>

    <!-- Pools -->
    <section class="card">
      <h3>Pools</h3>

      <div class="grid">
        <!-- One & Done NFL -->
        <div class="card">
          <h4 style="margin:0 0 6px;">One &amp; Done (NFL)</h4>
          <p class="muted" style="margin:0 0 10px;">
            Playoff one‑and‑done fantasy: roster, scoring, rounds/windows, players.
          </p>

          <div class="actions-row">
            <a class="btn btn--ghost btn--sm" href="./one-and-done.html">Manage</a>
          </div>
        </div>

        <!-- Additional pool cards can be added here -->
      </div>
    </section>

  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>

  <script>
    (async () => {
      try {
        if (typeof requireAdmin === "function") await requireAdmin();
      } catch (e) {
        console.error("Admin check failed:", e);
      }

      const logoutBtn = document.getElementById("logout-btn");
      logoutBtn.addEventListener("click", async () => {
        try {
          if (typeof doLogout === "function") {
            await doLogout();  // Your global logout
            return;
          }
        } catch (e) {
          console.warn("doLogout() failed:", e);
        }

        // Fallback redirect
        window.location.href = "../index.html";
      });
    })();
  </script>

</body>
</html>
