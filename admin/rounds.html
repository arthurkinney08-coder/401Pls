<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Rounds & Windows</title>
  <link rel="stylesheet" href="../styles.css" />
<style>
.admin-menu{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 12px;background:#1c1f24;border-radius:8px;margin:12px auto 0;max-width:1100px}
.admin-menu .spacer{flex:1}
.btn.sm{padding:6px 10px;font-size:13px}
.btn.active{background:#2d6cdf;color:#fff}
</style>
</head>
<body class="theme-dark">
<header class="topbar">
  <div class="brand">
    <img src="../logo.png" class="logo--small" alt="DFP" />
    <h1>One &amp; Done • Players</h1>
  </div>
  <!-- All 3 links and Logout use big white buttons -->
  <div class="actions" style="display:flex; gap:10px;">
    <a class="btn" href="./admin.html">Admin Home</a>
    <a class="btn" href="./one-and-done.html">One &amp; Done Home</a>
    <a class="btn" href="../dashboard.html">Catalog</a>
    <button class="btn" id="logout-btn">Logout</button>
  </div>
</header>

<main class="container admin-grid">
  <section class="card">
    <h3>Playoff Rounds</h3>
    <div id="rounds"></div>
    <button class="btn primary" id="add-round">Add Round</button>
  </section>
  <section class="card">
    <h3>Time Windows (ET)</h3>
    <div id="windows"></div>
    <button class="btn" id="add-window">Add Window</button>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/supabase.js"></script>
<script src="./rounds.js"></script>
<script>
(async ()=>{ if (typeof requireAdmin==='function') await requireAdmin();
  const b=document.getElementById('logout-btn'); if(b && typeof doLogout==='function') b.onclick=doLogout; })();
</script>

<script>
(async () => {
  await requireAdmin();
  document.getElementById("logout-btn").onclick = doLogout;

  // --- 1) INPUT-ID  <->  (category, stat) map
  const map = {
    // QB
    qb_pass_yd:      ['qb','pass_yd'],
    qb_pass_td:      ['qb','pass_td'],
    qb_int_thrown:   ['qb','int_thrown'],
    qb_fum_lost:     ['qb','fum_lost'],

    // RB
    rb_rush_yd:      ['rb','rush_yd'],
    rb_rush_td:      ['rb','rush_td'],
    rb_int_thrown:   ['rb','int_thrown'],
    rb_fum_lost:     ['rb','fum_lost'],

    // WR
    wr_rec_yd:       ['wr','rec_yd'],
    wr_rec_td:       ['wr','rec_td'],
    wr_int_thrown:   ['wr','int_thrown'],
    wr_fum_lost:     ['wr','fum_lost'],

    // TE
    te_rec_yd:       ['te','rec_yd'],
    te_rec_td:       ['te','rec_td'],
    te_int_thrown:   ['te','int_thrown'],
    te_fum_lost:     ['te','fum_lost'],

    // PPR shared (WR/RB/TE per reception)
    ppr_rec:         ['wr','rec'],   // we’ll also mirror to rb/te on save

    // Kicker
    k_pat:           ['k','pat'],
    k_fg_per_yard:   ['k','fg_per_yard'],
    k_pat_miss:      ['k','pat_miss'],
    k_fg_miss_0_19:  ['k','fg_miss_0_19'],
    k_fg_miss_20_29: ['k','fg_miss_20_29'],
    k_fg_miss_30_39: ['k','fg_miss_30_39'],
    k_fg_miss_40_49: ['k','fg_miss_40_49'],
    k_fg_miss_50_plus:['k','fg_miss_50_plus'],

    // DST / ST
    dst_sack:        ['dst','sack'],
    dst_turnover:    ['dst','turnover'],
    dst_safety:      ['dst','safety'],
    dst_td:          ['dst','dst_td'],
    st_td:           ['dst','st_td'],

    // Points-Allowed Tiers
    pa_0:            ['dst','pa_0'],
    pa_1_6:          ['dst','pa_1_6'],
    pa_7_13:         ['dst','pa_7_13'],
    pa_14_20:        ['dst','pa_14_20'],
    pa_21_27:        ['dst','pa_21_27'],
    pa_28_34:        ['dst','pa_28_34'],
    pa_35_plus:      ['dst','pa_35_plus'],
  };

  // --- 2) Build a requested set of keys
  const cats = new Set(Object.values(map).map(x => x[0]));
  // Grab all rows for those categories
  const { data: rows, error } = await sb
    .from('scoring_settings')
    .select('category, stat, value')
    .in('category', Array.from(cats));
  if (error) { console.warn(error.message); }

  // Index: category.stat -> value
  const dict = {};
  (rows || []).forEach(r => { dict[`${r.category}.${r.stat}`] = r.value; });

  // --- 3) Fill inputs
  for (const [id, [cat, stat]] of Object.entries(map)) {
    const el = document.getElementById(id);
    if (!el) continue;
    const key = `${cat}.${stat}`;
    if (dict.hasOwnProperty(key)) el.value = dict[key];
  }

  // --- 4) Save logic (if you don't already handle this in scoring.js)
  const upsert = async (category, stat, value) => {
    // upsert via single-row insert on (category, stat) unique
    const { error } = await sb.from('scoring_settings').upsert(
      [{ category, stat, value: Number(value) }],
      { onConflict: 'category,stat' }
    );
    if (error) throw error;
  };

  document.getElementById('save-btn')?.addEventListener('click', async () => {
    try {
      // Save every mapped input
      for (const [id, [cat, stat]] of Object.entries(map)) {
        const el = document.getElementById(id);
        if (!el) continue;
        await upsert(cat, stat, el.value || 0);
      }
      // Mirror PPR value to RB/TE too
      const ppr = document.getElementById('ppr_rec')?.value || 0;
      await upsert('rb','rec', ppr);
      await upsert('te','rec', ppr);

      alert('Scoring saved.');
    } catch (e) { alert(e.message || 'Save failed'); }
  });

  // --- 5) Reset defaults (optional)
  document.getElementById('reset-btn')?.addEventListener('click', async () => {
    if (!confirm('Reset scoring to defaults?')) return;
    try {
      // Example: you can re-apply your base seed values here if you like.
      // For now we’ll just clear inputs and you can re-run your SQL seed.
      for (const id of Object.keys(map)) {
        const el = document.getElementById(id);
        if (el) el.value = '';
      }
      alert('Cleared inputs. Re-run your SQL seed to restore default values.');
    } catch (e) { alert(e.message || 'Reset failed'); }
  });

})();
</script>
</body>
</html>
