<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Players</title>

  <!-- Favicon & Styles -->
  <link rel="icon" href="../logo.png" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="../styles/buttons.css" />

  <style>
    :root{
      --pad-card:12px;
      --gap:10px;
      --row-gap:8px;
      --input-min-h:30px;
    }
    .grid { display:grid; gap: var(--gap); }
    .grid.cols-2 { grid-template-columns: 1fr 1fr; }
    .row { display:grid; grid-template-columns: 140px 1fr; gap:8px; align-items:center; }
    .muted { color:#a7acb5; }

    /* Tighten cards and areas */
    .card { padding: var(--pad-card); }
    .top-actions { display:flex; gap:8px; align-items:center; }
    .form-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:8px; flex-wrap:wrap; }

    /* Inputs compact */
    input.input, select.input, .row input, .row select {
      min-height: var(--input-min-h);
      padding:6px 8px;
    }

    /* Table: compact, minimal padding */
    .table { width:100%; border-collapse:collapse; }
    .table th, .table td { padding:8px 10px; border-bottom:1px solid #2a2a2a; text-align:left; }
    .table thead th { background:rgba(255,255,255,0.04); }
    .table tr:last-child td { border-bottom:0; }

    /* Action buttons in table rows */
    .row-actions { display:flex; gap:8px; justify-content:flex-end; }
  </style>
</head>

<body class="theme-dark">
  <!-- Header -->
  <header class="topbar">
    <div class="brand">
      <img src="../logo.png" class="logo--small" alt="DFP" />
      <h1>One &amp; Done • Players</h1>
    </div>
    <!-- Quiet gray nav -->
    <div class="actions" style="display:flex; gap:8px; align-items:center;">
 <a class="btn btn--quiet btn--sm" href="./one-and-done.html">Overview</a>
 <a class="btn btn--quiet btn--sm" href="./admin.html">Admin Home</a>     
      <a class="btn btn--quiet btn--sm" href="../dashboard.html">Back to Pools</a>
      <button class="btn btn--quiet btn--sm" id="logout-btn">Logout</button>
    </div>
  </header>

  <main class="container" style="max-width:1100px;">
    <!-- Add / Edit Player -->
    <section class="card">
      <h3 style="margin:0 0 6px 0;">Add / Edit Player</h3>
      <div class="grid cols-2">
        <div class="row">
          <label>Full Name</label>
          <input id="p.full_name" placeholder="e.g., Patrick Mahomes" />
        </div>
        <div class="row">
          <label>Position</label>
          <select id="p.position">
            <option>QB</option><option>RB</option><option>WR</option>
            <option>TE</option><option>K</option><option>DST</option>
          </select>
        </div>
        <div class="row">
          <label>Team</label>
          <input id="p.team" placeholder="e.g., KC" />
        </div>
        <!-- Game Date (ET) -->
        <div class="row">
          <label>Game Date (ET)</label>
          <input id="p.game_date" type="date" />
        </div>
        <!-- Game Time (ET) -->
        <div class="row">
          <label>Game Time (ET)</label>
          <input id="p.game_time" type="text" placeholder="13:00 or 1:00 PM" />
        </div>
      </div>

      <!-- Form actions -->
      <div class="form-actions">
        <button class="btn btn--ghost-danger btn--sm" id="p.reset">Reset</button>
        <button class="btn btn--ghost btn--sm" id="p.save">Save Player</button>
      </div>
    </section>

    <!-- Sync Button (optional) -->
    <section class="card" style="display:flex; justify-content:flex-end; gap:8px; margin-top:12px;">
      <button class="btn btn--ghost btn--sm" id="p.sync">Sync Players</button>
    </section>

    <!-- Player Table -->
    <section class="card">
      <h3 style="margin:0 0 6px 0;">Players</h3>
      <div class="top-actions" style="margin-bottom:8px;">
        <input id="s.search" class="input" placeholder="Search name/team" style="flex:1" />
        <select id="s.position" class="input">
          <option value="">All positions</option>
          <option value="QB">QB</option><option value="RB">RB</option>
          <option value="WR">WR</option><option value="TE">TE</option>
          <option value="K">K</option><option value="DST">DST</option>
        </select>
      </div>

      <table class="table" id="playersTable">
        <thead>
          <tr>
            <th>Name</th><th>Pos</th><th>Team</th><th>Game Time (ET)</th><th style="width:200px;"></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div id="empty" class="muted" hidden>No players yet.</div>
    </section>
  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>

  <!-- Page logic (IDs preserved; styling & spacing updated) -->
 <script src="./players.js"></script>
</body>
</html>
