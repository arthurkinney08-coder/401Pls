<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DFP — One & Done • Lineup</title>
  <link rel="icon" href="../logo.png" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="../styles/buttons.css" />
  <style>
    .lineup-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 16px;
    }
    @media (max-width: 600px) {
      .lineup-grid { grid-template-columns: 1fr; }
    }
    .slot-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .slot-card.slot-locked { border-color: rgba(239,68,68,0.35); }
    .slot-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--border);
    }
    .slot-card.slot-locked .slot-header { background: rgba(239,68,68,0.08); }
    .slot-title {
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .04em;
    }
    .slot-count {
      font-size: .85rem;
      color: var(--muted);
    }
    .slot-count.locked-tag { color: #ef4444; font-weight: 700; }
    .slot-body {
      max-height: 280px;
      overflow-y: auto;
      padding: 6px 0;
    }
    .slot-locked-banner {
      padding: 14px;
      text-align: center;
      color: #ef4444;
      font-weight: 600;
      font-size: .9rem;
    }
    .player-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      cursor: pointer;
      transition: background .12s;
      gap: 10px;
    }
    .player-row:hover { background: rgba(255,255,255,0.04); }
    .player-row.selected { background: rgba(59,130,246,0.15); }
    .player-row.locked { opacity: 0.5; cursor: not-allowed; }
    .player-row.used { opacity: 0.4; cursor: not-allowed; }
    .player-info { flex: 1; min-width: 0; }
    .player-name { font-weight: 600; font-size: .95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-team { font-size: .8rem; color: var(--muted); }
    .status-badge {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .05em;
      padding: 3px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .badge-eligible { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .badge-locked { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .badge-used { background: rgba(167,172,181,0.15); color: var(--muted); border: 1px solid var(--border); }
    .badge-selected { background: rgba(59,130,246,0.2); color: #3b82f6; border: 1px solid rgba(59,130,246,0.4); }
    .picks-bar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-top: 16px;
    }
    .picks-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .pick-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.35);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: .85rem;
    }
    .pick-chip.locked-chip {
      background: rgba(239,68,68,0.12);
      border-color: rgba(239,68,68,0.35);
    }
    .pick-chip .pos { font-weight: 700; color: #3b82f6; }
    .pick-chip.locked-chip .pos { color: #ef4444; }
    .pick-chip .lock-icon { font-size: .85rem; }
    .pick-chip .remove {
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1;
      background: none;
      border: none;
      padding: 0;
    }
    .pick-chip .remove:hover { color: #ef4444; }
    .save-row {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
      align-items: center;
    }
    .search-bar {
      width: 100%;
      margin-bottom: 12px;
    }
    .missing-msg { color: var(--warning); font-size: .9rem; margin-top: 6px; }
    .inline-toast {
      color: #ef4444;
      font-size: .85rem;
      margin-right: auto;
      opacity: 0;
      transition: opacity .2s;
    }
    .inline-toast.show { opacity: 1; }
  </style>
</head>
<body class="theme-dark">
  <header class="topbar">
    <div class="brand">
      <img src="../logo.png" class="logo--small" alt="DFP" />
      <h1 id="page-title">One &amp; Done • Lineup</h1>
    </div>
    <div class="actions" style="display:flex; gap:8px; align-items:center;">
      <a class="btn btn--quiet btn--sm" href="./one-and-done.html">My Teams</a>
      <a class="btn btn--quiet btn--sm" href="./one-and-done-leaderboard.html">Leaderboard</a>
      <a class="btn btn--quiet btn--sm" href="../dashboard.html">Back to Pools</a>
      <button class="btn btn--quiet btn--sm" id="logout-btn">Logout</button>
    </div>
  </header>

  <main class="container" style="max-width:1100px;">
    <!-- Picks summary bar -->
    <div class="picks-bar">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <strong>Your Picks</strong>
        <button class="btn btn--ghost-danger btn--sm" id="clear-all-btn">Clear All</button>
      </div>
      <div class="picks-chips" id="picks-chips">
        <span class="muted" id="no-picks-msg">No picks yet — select players below</span>
      </div>
      <div class="missing-msg" id="missing-msg" hidden></div>
    </div>

    <!-- Search -->
    <input type="search" class="search-bar" id="player-search" placeholder="Search player or team..." style="margin-top:16px;" />

    <!-- Position grid -->
    <div class="lineup-grid" id="lineup-grid"></div>

    <!-- Save -->
    <div class="save-row">
      <span class="inline-toast" id="inline-toast"></span>
      <button class="btn btn--ghost btn--sm" id="save-btn">Save Lineup</button>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>

  <script>
  (async () => {
    try { if (typeof requireAuth === 'function') await requireAuth(); } catch(_) {}

    document.getElementById('logout-btn')?.addEventListener('click', async () => {
      try { if (typeof doLogout === 'function') { await doLogout(); return; } } catch(e) {}
      window.location.href = '../index.html';
    });

    // ── Get URL params ──────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const teamId = params.get('team') || params.get('team_id');
    const teamName = params.get('teamName') || params.get('name') || 'Your Team';

    if (!teamId) {
      alert('No team selected!');
      window.location.href = './one-and-done.html';
      return;
    }

    document.getElementById('page-title').textContent = `One & Done — ${teamName}`;

    // ── Constants ───────────────────────────────────────────
    const POSITIONS = ['QB', 'RB', 'WR', 'TE', 'FLEX', 'K', 'DST'];
    const FLEX_POSITIONS = ['RB', 'WR', 'TE'];
    const now = new Date();

    // ── State ───────────────────────────────────────────────
    let picks = {};               // { QB: playerId, RB: [id1, id2], ... }
    let players = [];             // all players from DB
    let playerById = new Map();   // quick lookup
    let lockedPickIds = new Set();// player_ids whose game already started AND are picked → cannot remove
    let rosterSettings = { QB:1, RB:2, WR:2, TE:1, FLEX:1, K:1, DST:1 };

    // ── Helpers ─────────────────────────────────────────────
    function gameHasStarted(player) {
      if (!player) return false;
      const gs = player.game_start_utc ? new Date(player.game_start_utc) : null;
      return !!(gs && gs <= now);
    }

    function showToast(msg) {
      const t = document.getElementById('inline-toast');
      if (!t) return;
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => t.classList.remove('show'), 2600);
    }

    // ── Load roster settings ────────────────────────────────
    try {
      const { data } = await sb.from('roster_settings').select('position, quantity');
      if (data && data.length) {
        rosterSettings = {};
        data.forEach(r => { rosterSettings[r.position] = r.quantity; });
      }
    } catch(e) { console.warn('roster settings error', e); }

    // ── Load all players ────────────────────────────────────
    const { data: playerData, error: playerErr } = await sb
      .from('players')
      .select('id, full_name, position, team, game_start_utc, sport')
      .eq('sport', 'nfl')
      .eq('is_active', true)
      .order('full_name');

    if (playerErr) { alert('Failed to load players'); return; }
    players = playerData || [];
    playerById = new Map(players.map(p => [p.id, p]));

    // ── Load existing picks for this team (current round) ───
    // IMPORTANT: we keep ALL picks in state — including started ones —
    // so that started picks stay visible, locked, and survive a save.
    try {
      // figure out current round first
      let currentRound = 'Offseason';
      try {
        const { data: roundRow } = await sb
          .from('system_settings').select('value')
          .eq('key', 'current_round_label').maybeSingle();
        if (roundRow?.value) currentRound = roundRow.value;
      } catch(_) {}

      const { data: existingPicks } = await sb
        .from('one_and_done_picks')
        .select('slot, player_id, round_label, players(game_start_utc)')
        .eq('team_id', teamId)
        .eq('round_label', currentRound);

      (existingPicks || []).forEach(pick => {
        const slot = pick.slot;
        const qty = rosterSettings[slot] || 1;
        if (qty > 1) {
          if (!picks[slot]) picks[slot] = [];
          picks[slot].push(pick.player_id);
        } else {
          picks[slot] = pick.player_id;
        }
        // mark as locked if its game already started
        const gs = pick.players?.game_start_utc;
        if (gs && new Date(gs) <= now) lockedPickIds.add(pick.player_id);
      });
    } catch(e) { console.warn('existing picks error', e); }

    // ── Status of a player relative to a slot ───────────────
    function getPlayerStatus(player, currentSlot) {
      if (!player) return { status: 'eligible', label: 'Eligible' };

      const isPicked = isPickedInSlot(player.id, currentSlot);

      // A picked player whose game started = locked-in (stays, can't remove)
      if (isPicked && lockedPickIds.has(player.id)) return { status: 'locked', label: 'Locked' };

      // An UNPICKED player whose game started = unselectable
      if (!isPicked && gameHasStarted(player)) return { status: 'started', label: 'Game started' };

      // Picked in a different slot
      for (const slot of POSITIONS) {
        if (slot === currentSlot) continue;
        const qty = rosterSettings[slot] || 1;
        const inSlot = qty > 1
          ? (picks[slot] || []).includes(player.id)
          : picks[slot] === player.id;
        if (inSlot) return { status: 'in-slot', label: `In ${slot}` };
      }

      if (isPicked) return { status: 'selected', label: 'Selected' };
      return { status: 'eligible', label: 'Eligible' };
    }

    function isPickedInSlot(playerId, slot) {
      const qty = rosterSettings[slot] || 1;
      if (qty > 1) return (picks[slot] || []).includes(playerId);
      return picks[slot] === playerId;
    }

    function isPickedAnywhere(playerId) {
      return POSITIONS.some(slot => {
        const qty = rosterSettings[slot] || 1;
        if (qty > 1) return (picks[slot] || []).includes(playerId);
        return picks[slot] === playerId;
      });
    }

    // How many seats in a slot are filled by locked (started) players
    function lockedCountInSlot(slot) {
      const qty = rosterSettings[slot] || 1;
      if (qty > 1) return (picks[slot] || []).filter(id => lockedPickIds.has(id)).length;
      return (picks[slot] && lockedPickIds.has(picks[slot])) ? 1 : 0;
    }

    // Is the whole slot locked? (all seats filled AND all filled with started players)
    function isSlotFullyLocked(slot) {
      const qty = rosterSettings[slot] || 1;
      const filled = qty > 1 ? (picks[slot] || []).length : (picks[slot] ? 1 : 0);
      return filled >= qty && lockedCountInSlot(slot) >= qty;
    }

    // ── Get players for a slot ───────────────────────────────
    function getPlayersForSlot(slot) {
      const search = (document.getElementById('player-search')?.value || '').toLowerCase();
      let filtered = players.filter(p => {
        if (slot === 'FLEX') return FLEX_POSITIONS.includes(p.position);
        return p.position === slot;
      });
      if (search) {
        filtered = filtered.filter(p =>
          p.full_name.toLowerCase().includes(search) ||
          (p.team || '').toLowerCase().includes(search)
        );
      }
      return filtered;
    }

    // ── Pick / unpick a player ───────────────────────────────
    function togglePick(playerId, slot) {
      const player = playerById.get(playerId);
      const isPicked = isPickedInSlot(playerId, slot);

      // Can't touch a locked pick (its game started)
      if (isPicked && lockedPickIds.has(playerId)) {
        showToast('That game has already started — pick is locked.');
        return;
      }
      // Can't select an unpicked player whose game started
      if (!isPicked && gameHasStarted(player)) {
        showToast('That game has already started — cannot pick.');
        return;
      }

      const qty = rosterSettings[slot] || 1;
      if (qty > 1) {
        if (!picks[slot]) picks[slot] = [];
        const idx = picks[slot].indexOf(playerId);
        if (idx >= 0) {
          picks[slot].splice(idx, 1);
        } else {
          // count open (non-locked) capacity
          if (picks[slot].length >= qty) {
            showToast(`${slot} is full (${qty}).`);
            return;
          }
          if (isPickedAnywhere(playerId) && !isPickedInSlot(playerId, slot)) return;
          picks[slot].push(playerId);
        }
      } else {
        if (picks[slot] === playerId) {
          delete picks[slot];
        } else {
          // single slot: if current pick is locked, refuse
          if (picks[slot] && lockedPickIds.has(picks[slot])) {
            showToast('That game has already started — slot is locked.');
            return;
          }
          if (isPickedAnywhere(playerId)) return;
          picks[slot] = playerId;
        }
      }
      renderAll();
    }

    // ── Render a single slot card ────────────────────────────
    function renderSlotCard(slot) {
      const qty = rosterSettings[slot] || 1;
      const slotPlayers = getPlayersForSlot(slot);
      const selectedCount = qty > 1 ? (picks[slot] || []).length : (picks[slot] ? 1 : 0);
      const fullyLocked = isSlotFullyLocked(slot);

      const card = document.createElement('div');
      card.className = 'slot-card' + (fullyLocked ? ' slot-locked' : '');
      card.dataset.slot = slot;

      // Header
      const header = document.createElement('div');
      header.className = 'slot-header';
      header.innerHTML = `
        <span class="slot-title">${slot}</span>
        <span class="slot-count ${fullyLocked ? 'locked-tag' : ''}">
          ${fullyLocked ? '🔒 Game started' : `Selected ${selectedCount} of ${qty}`}
        </span>
      `;
      card.appendChild(header);

      // If fully locked, show a banner instead of the player list
      if (fullyLocked) {
        const banner = document.createElement('div');
        banner.className = 'slot-locked-banner';
        const names = (qty > 1 ? (picks[slot] || []) : [picks[slot]])
          .map(id => playerById.get(id)?.full_name).filter(Boolean).join(', ');
        banner.innerHTML = `🔒 Locked — game started<br><span class="muted" style="font-weight:400">${names}</span>`;
        card.appendChild(banner);
        return card;
      }

      // Body (normal)
      const body = document.createElement('div');
      body.className = 'slot-body';

      if (!slotPlayers.length) {
        body.innerHTML = `<div class="muted" style="padding:12px;">No players found.</div>`;
      } else {
        slotPlayers.forEach(player => {
          const { status, label } = getPlayerStatus(player, slot);
          const isPicked = isPickedInSlot(player.id, slot);
          const isLockedPick = isPicked && lockedPickIds.has(player.id);
          const isStartedUnpicked = !isPicked && status === 'started';

          const row = document.createElement('div');
          row.className = `player-row${isPicked ? ' selected' : ''}${(isLockedPick || isStartedUnpicked) ? ' locked' : ''}`;

          let badgeClass = 'badge-eligible';
          let badgeText = label;
          if (isLockedPick) { badgeClass = 'badge-locked'; badgeText = 'Locked'; }
          else if (isStartedUnpicked) { badgeClass = 'badge-locked'; badgeText = 'Game started'; }
          else if (isPicked) { badgeClass = 'badge-selected'; badgeText = 'Selected'; }
          else if (status === 'in-slot') { badgeClass = 'badge-used'; }

          row.innerHTML = `
            <div class="player-info">
              <div class="player-name">${player.full_name}</div>
              <div class="player-team">${player.team || ''}</div>
            </div>
            <span class="status-badge ${badgeClass}">${badgeText}</span>
          `;

          // Clickable only if: eligible, OR a selected-but-not-locked pick (to allow unpick), OR full slot toggle
          const clickable =
            status === 'eligible' ||
            (isPicked && !isLockedPick);

          if (clickable) {
            row.style.cursor = 'pointer';
            row.addEventListener('click', () => togglePick(player.id, slot));
          } else {
            row.style.cursor = 'not-allowed';
            // still allow a click to show the toast for started players
            if (isStartedUnpicked || isLockedPick) {
              row.addEventListener('click', () => togglePick(player.id, slot));
            }
          }

          body.appendChild(row);
        });
      }

      card.appendChild(body);
      return card;
    }

    // ── Render picks chips ───────────────────────────────────
    function renderPicksBar() {
      const chips = document.getElementById('picks-chips');
      const noMsg = document.getElementById('no-picks-msg');
      chips.innerHTML = '';

      let hasAny = false;
      const addChip = (slot, pid) => {
        const p = playerById.get(pid);
        if (!p) return;
        hasAny = true;
        const locked = lockedPickIds.has(pid);
        const chip = document.createElement('span');
        chip.className = 'pick-chip' + (locked ? ' locked-chip' : '');
        chip.innerHTML = locked
          ? `<span class="pos">${slot}</span> ${p.full_name} <span class="lock-icon">🔒</span>`
          : `<span class="pos">${slot}</span> ${p.full_name} <button class="remove" data-slot="${slot}" data-pid="${pid}">×</button>`;
        chips.appendChild(chip);
      };

      POSITIONS.forEach(slot => {
        const qty = rosterSettings[slot] || 1;
        if (qty > 1) (picks[slot] || []).forEach(pid => addChip(slot, pid));
        else if (picks[slot]) addChip(slot, picks[slot]);
      });

      noMsg.hidden = hasAny;

      chips.querySelectorAll('.remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const slot = btn.dataset.slot;
          const pid = btn.dataset.pid;
          if (lockedPickIds.has(pid)) { showToast('That pick is locked.'); return; }
          const qty = rosterSettings[slot] || 1;
          if (qty > 1) picks[slot] = (picks[slot] || []).filter(id => id !== pid);
          else delete picks[slot];
          renderAll();
        });
      });
    }

    // ── Render everything ────────────────────────────────────
    function renderAll() {
      const grid = document.getElementById('lineup-grid');
      grid.innerHTML = '';
      POSITIONS.forEach(slot => {
        if ((rosterSettings[slot] || 0) > 0) grid.appendChild(renderSlotCard(slot));
      });
      renderPicksBar();
    }

    // ── Save lineup ──────────────────────────────────────────
    async function saveLineup() {
      const saveBtn = document.getElementById('save-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      try {
        // current round
        let currentRound = 'Offseason';
        try {
          const { data: roundRow } = await sb
            .from('system_settings').select('value')
            .eq('key', 'current_round_label').maybeSingle();
          if (roundRow?.value) currentRound = roundRow.value;
        } catch (e) { console.warn('round read failed', e); }

        // Build rows from current state (includes locked picks so they persist)
        const rows = [];
        POSITIONS.forEach(slot => {
          const qty = rosterSettings[slot] || 1;
          if (qty > 1) {
            (picks[slot] || []).forEach(pid => rows.push({ team_id: teamId, slot, player_id: pid, round_label: currentRound }));
          } else if (picks[slot]) {
            rows.push({ team_id: teamId, slot, player_id: picks[slot], round_label: currentRound });
          }
        });

        if (!rows.length) {
          alert('Please select at least one player!');
          return;
        }

        // Delete ONLY the unlocked picks for this round, leaving started/locked ones untouched.
        const lockedIds = Array.from(lockedPickIds);
        let delQuery = sb.from('one_and_done_picks')
          .delete()
          .eq('team_id', teamId)
          .eq('round_label', currentRound);
        if (lockedIds.length) {
          // don't delete the locked ones
          delQuery = delQuery.not('player_id', 'in', `(${lockedIds.join(',')})`);
        }
        const { error: delErr } = await delQuery;
        if (delErr) throw delErr;

        // Insert only the NON-locked rows (locked ones already exist in DB and weren't deleted)
        const rowsToInsert = rows.filter(r => !lockedPickIds.has(r.player_id));
        if (rowsToInsert.length) {
          const { error: insErr } = await sb.from('one_and_done_picks').insert(rowsToInsert);
          if (insErr) throw insErr;
        }

        // Send confirmation email
        try {
          const { data: { session } } = await sb.auth.getSession();
          if (session) {
            await fetch(`${window.SUPABASE_URL}/functions/v1/send-pick-confirmation`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
              body: JSON.stringify({ entry_id: teamId, window_id: null })
            });
          }
        } catch(e) { console.warn('Email send failed:', e); }

        alert('✅ Lineup saved!');
      } catch(e) {
        alert('Save failed: ' + e.message);
        console.error(e);
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Lineup';
      }
    }

    // ── Wire up ──────────────────────────────────────────────
    document.getElementById('save-btn').addEventListener('click', saveLineup);
    document.getElementById('clear-all-btn').addEventListener('click', () => {
      // Clear All keeps locked picks (can't remove those)
      const kept = {};
      POSITIONS.forEach(slot => {
        const qty = rosterSettings[slot] || 1;
        if (qty > 1) {
          const lockedInSlot = (picks[slot] || []).filter(id => lockedPickIds.has(id));
          if (lockedInSlot.length) kept[slot] = lockedInSlot;
        } else if (picks[slot] && lockedPickIds.has(picks[slot])) {
          kept[slot] = picks[slot];
        }
      });
      picks = kept;
      renderAll();
    });
    document.getElementById('player-search').addEventListener('input', renderAll);

    // ── Initial render ───────────────────────────────────────
    renderAll();

  })();
  </script>
</body>
</html>
