<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DFP — One & Done • Lineup</title>
  <link rel="icon" href="../logo.png" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="../styles/buttons.css" />
  <style>
    .lineup-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 16px;
    }
    @media (max-width: 600px) {
      .lineup-grid { grid-template-columns: 1fr; }
    }
    .slot-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .slot-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--border);
    }
    .slot-title {
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .04em;
    }
    .slot-count {
      font-size: .85rem;
      color: var(--muted);
    }
    .slot-body {
      max-height: 280px;
      overflow-y: auto;
      padding: 6px 0;
    }
    .player-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      cursor: pointer;
      transition: background .12s;
      gap: 10px;
    }
    .player-row:hover { background: rgba(255,255,255,0.04); }
    .player-row.selected { background: rgba(59,130,246,0.15); }
    .player-row.locked { opacity: 0.5; cursor: not-allowed; }
    .player-row.used { opacity: 0.4; cursor: not-allowed; }
    .player-info { flex: 1; min-width: 0; }
    .player-name { font-weight: 600; font-size: .95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-team { font-size: .8rem; color: var(--muted); }
    .status-badge {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .05em;
      padding: 3px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .badge-eligible { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .badge-locked { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .badge-used { background: rgba(167,172,181,0.15); color: var(--muted); border: 1px solid var(--border); }
    .badge-selected { background: rgba(59,130,246,0.2); color: #3b82f6; border: 1px solid rgba(59,130,246,0.4); }
    .picks-bar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-top: 16px;
    }
    .picks-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .pick-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.35);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: .85rem;
    }
    .pick-chip .pos { font-weight: 700; color: #3b82f6; }
    .pick-chip .remove {
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1;
      background: none;
      border: none;
      padding: 0;
    }
    .pick-chip .remove:hover { color: #ef4444; }
    .save-row {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }
    .search-bar {
      width: 100%;
      margin-bottom: 12px;
    }
    .missing-msg { color: var(--warning); font-size: .9rem; margin-top: 6px; }
  </style>
</head>
<body class="theme-dark">
  <header class="topbar">
    <div class="brand">
      <img src="../logo.png" class="logo--small" alt="DFP" />
      <h1 id="page-title">One &amp; Done • Lineup</h1>
    </div>
    <div class="actions" style="display:flex; gap:8px; align-items:center;">
      <a class="btn btn--quiet btn--sm" href="./one-and-done.html">My Teams</a>
      <a class="btn btn--quiet btn--sm" href="./one-and-done-leaderboard.html">Leaderboard</a>
      <a class="btn btn--quiet btn--sm" href="../dashboard.html">Back to Pools</a>
      <button class="btn btn--quiet btn--sm" id="logout-btn">Logout</button>
    </div>
  </header>

  <main class="container" style="max-width:1100px;">
    <!-- Picks summary bar -->
    <div class="picks-bar">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <strong>Your Picks</strong>
        <button class="btn btn--ghost-danger btn--sm" id="clear-all-btn">Clear All</button>
      </div>
      <div class="picks-chips" id="picks-chips">
        <span class="muted" id="no-picks-msg">No picks yet — select players below</span>
      </div>
      <div class="missing-msg" id="missing-msg" hidden></div>
    </div>

    <!-- Search -->
    <input type="search" class="search-bar" id="player-search" placeholder="Search player or team..." style="margin-top:16px;" />

    <!-- Position grid -->
    <div class="lineup-grid" id="lineup-grid"></div>

    <!-- Save -->
    <div class="save-row">
      <button class="btn btn--ghost btn--sm" id="save-btn">Save Lineup</button>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>

  <script>
  (async () => {
    try { if (typeof requireAuth === 'function') await requireAuth(); } catch(_) {}

    document.getElementById('logout-btn')?.addEventListener('click', async () => {
      try { if (typeof doLogout === 'function') { await doLogout(); return; } } catch(e) {}
      window.location.href = '../index.html';
    });

    // ── Get URL params ──────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const teamId = params.get('team') || params.get('team_id');
    const teamName = params.get('teamName') || params.get('name') || 'Your Team';

    if (!teamId) {
      alert('No team selected!');
      window.location.href = './one-and-done.html';
      return;
    }

    document.getElementById('page-title').textContent = `One & Done — ${teamName}`;

    // ── Constants ───────────────────────────────────────────
    const POSITIONS = ['QB', 'RB', 'WR', 'TE', 'FLEX', 'K', 'DST'];
    const FLEX_POSITIONS = ['RB', 'WR', 'TE'];
    const now = new Date();

    // ── State ───────────────────────────────────────────────
    let picks = {}; // { QB: playerId, RB: [id1, id2], ... }
    let players = []; // all players from DB
    let usedPlayerIds = new Set(); // used in past started rounds
    let rosterSettings = { QB:1, RB:2, WR:2, TE:1, FLEX:1, K:1, DST:1 };

    // ── Load roster settings ────────────────────────────────
    try {
      const { data } = await sb.from('roster_settings').select('position, quantity');
      if (data && data.length) {
        rosterSettings = {};
        data.forEach(r => { rosterSettings[r.position] = r.quantity; });
      }
    } catch(e) { console.warn('roster settings error', e); }

    // ── Load all players ────────────────────────────────────
    const { data: playerData, error: playerErr } = await sb
      .from('players')
      .select('id, full_name, position, team, game_start_utc, sport')
      .eq('sport', 'nfl')
      .eq('is_active', true)
      .order('full_name');

    if (playerErr) { alert('Failed to load players'); return; }
    players = playerData || [];

    // ── Load used players (picks from past started games) ───
    try {
      const { data: pastPicks } = await sb
        .from('one_and_done_picks')
        .select('player_id, players(game_start_utc)')
        .eq('team_id', teamId);

      (pastPicks || []).forEach(pick => {
        const gameStart = pick.players?.game_start_utc;
        if (gameStart && new Date(gameStart) <= now) {
          usedPlayerIds.add(pick.player_id);
        }
      });
    } catch(e) { console.warn('used players error', e); }

    // ── Load existing picks for this team ───────────────────
    try {
      const { data: existingPicks } = await sb
        .from('one_and_done_picks')
        .select('slot, player_id, players(game_start_utc)')
        .eq('team_id', teamId);

      (existingPicks || []).forEach(pick => {
        const gameStart = pick.players?.game_start_utc;
        const isStarted = gameStart && new Date(gameStart) <= now;
        // Only restore picks for games that haven't started yet
        if (!isStarted) {
          const slot = pick.slot;
          const qty = rosterSettings[slot] || 1;
          if (qty > 1) {
            if (!picks[slot]) picks[slot] = [];
            picks[slot].push(pick.player_id);
          } else {
            picks[slot] = pick.player_id;
          }
        }
      });
    } catch(e) { console.warn('existing picks error', e); }

    // ── Player status ────────────────────────────────────────
function getPlayerStatus(player, currentSlot) {
  if (!player) return { status: 'eligible', label: 'Eligible' };
  const gameStart = player.game_start_utc ? new Date(player.game_start_utc) : null;
  if (gameStart && gameStart <= now) return { status: 'locked', label: 'Locked' };
  if (usedPlayerIds.has(player.id)) return { status: 'used', label: 'Used' };
  
  // Check if picked in another slot
  for (const slot of POSITIONS) {
    if (slot === currentSlot) continue;
    const qty = rosterSettings[slot] || 1;
    const inSlot = qty > 1 
      ? (picks[slot] || []).includes(player.id)
      : picks[slot] === player.id;
    if (inSlot) return { status: 'in-slot', label: `In ${slot}` };
  }
  
  return { status: 'eligible', label: 'Eligible' };
}

    function isPickedInSlot(playerId, slot) {
      const qty = rosterSettings[slot] || 1;
      if (qty > 1) {
        return (picks[slot] || []).includes(playerId);
      }
      return picks[slot] === playerId;
    }

    function isPickedAnywhere(playerId) {
      return POSITIONS.some(slot => {
        const qty = rosterSettings[slot] || 1;
        if (qty > 1) return (picks[slot] || []).includes(playerId);
        return picks[slot] === playerId;
      });
    }

    // ── Get players for a slot ───────────────────────────────
    function getPlayersForSlot(slot) {
      const search = (document.getElementById('player-search')?.value || '').toLowerCase();
      let filtered = players.filter(p => {
        if (slot === 'FLEX') return FLEX_POSITIONS.includes(p.position);
        return p.position === slot;
      });
      if (search) {
        filtered = filtered.filter(p =>
          p.full_name.toLowerCase().includes(search) ||
          (p.team || '').toLowerCase().includes(search)
        );
      }
      return filtered;
    }

    // ── Pick a player ────────────────────────────────────────
    function togglePick(playerId, slot) {
      const status = getPlayerStatus(players.find(p => p.id === playerId));
      if (status === 'locked' || status === 'used') return;

      const qty = rosterSettings[slot] || 1;
      if (qty > 1) {
        if (!picks[slot]) picks[slot] = [];
        const idx = picks[slot].indexOf(playerId);
        if (idx >= 0) {
          picks[slot].splice(idx, 1);
        } else if (picks[slot].length < qty) {
          // Check not used in another slot
          if (isPickedAnywhere(playerId) && !isPickedInSlot(playerId, slot)) return;
          picks[slot].push(playerId);
        }
      } else {
        if (picks[slot] === playerId) {
          delete picks[slot];
        } else {
          if (isPickedAnywhere(playerId)) return;
          picks[slot] = playerId;
        }
      }
      renderAll();
    }

    // ── Render a single slot card ────────────────────────────
    function renderSlotCard(slot) {
      const qty = rosterSettings[slot] || 1;
      const slotPlayers = getPlayersForSlot(slot);
      const selectedCount = qty > 1
        ? (picks[slot] || []).length
        : (picks[slot] ? 1 : 0);

      const card = document.createElement('div');
      card.className = 'slot-card';
      card.dataset.slot = slot;

      // Header
      const header = document.createElement('div');
      header.className = 'slot-header';
      header.innerHTML = `
        <span class="slot-title">${slot}</span>
        <span class="slot-count">Selected ${selectedCount} of ${qty}</span>
      `;
      card.appendChild(header);

      // Body
      const body = document.createElement('div');
      body.className = 'slot-body';

      if (!slotPlayers.length) {
        body.innerHTML = `<div class="muted" style="padding:12px;">No players found.</div>`;
      } else {
        slotPlayers.forEach(player => {
          const { status, label } = getPlayerStatus(player, slot);
          const isPicked = isPickedInSlot(player.id, slot);

          const row = document.createElement('div');
          row.className = `player-row${isPicked ? ' selected' : ''}${status === 'locked' ? ' locked' : ''}${status === 'used' ? ' used' : ''}`;

       let badgeClass = 'badge-eligible';
      let badgeText = label;
      if (isPicked) { badgeClass = 'badge-selected'; badgeText = 'Selected'; }
      else if (status === 'locked') { badgeClass = 'badge-locked'; }
      else if (status === 'used') { badgeClass = 'badge-used'; }
      else if (status === 'in-slot') { badgeClass = 'badge-used'; }


          row.innerHTML = `
            <div class="player-info">
              <div class="player-name">${player.full_name}</div>
              <div class="player-team">${player.team || ''}</div>
            </div>
            <span class="status-badge ${badgeClass}">${badgeText}</span>
          `;

          if ((status === 'eligible' || isPicked) && status !== 'in-slot') {
            row.addEventListener('click', () => togglePick(player.id, slot));
          }

          body.appendChild(row);
        });
      }

      card.appendChild(body);
      return card;
    }

    // ── Render picks chips ───────────────────────────────────
    function renderPicksBar() {
      const chips = document.getElementById('picks-chips');
      const noMsg = document.getElementById('no-picks-msg');
      chips.innerHTML = '';

      let hasAny = false;
      POSITIONS.forEach(slot => {
        const qty = rosterSettings[slot] || 1;
        if (qty > 1) {
          (picks[slot] || []).forEach(pid => {
            const p = players.find(x => x.id === pid);
            if (!p) return;
            hasAny = true;
            const chip = document.createElement('span');
            chip.className = 'pick-chip';
            chip.innerHTML = `<span class="pos">${slot}</span> ${p.full_name} <button class="remove" data-slot="${slot}" data-pid="${pid}">×</button>`;
            chips.appendChild(chip);
          });
        } else if (picks[slot]) {
          const p = players.find(x => x.id === picks[slot]);
          if (!p) return;
          hasAny = true;
          const chip = document.createElement('span');
          chip.className = 'pick-chip';
          chip.innerHTML = `<span class="pos">${slot}</span> ${p.full_name} <button class="remove" data-slot="${slot}" data-pid="${picks[slot]}">×</button>`;
          chips.appendChild(chip);
        }
      });

      noMsg.hidden = hasAny;

      // Wire remove buttons
      chips.querySelectorAll('.remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const slot = btn.dataset.slot;
          const pid = btn.dataset.pid;
          const qty = rosterSettings[slot] || 1;
          if (qty > 1) {
            picks[slot] = (picks[slot] || []).filter(id => id !== pid);
          } else {
            delete picks[slot];
          }
          renderAll();
        });
      });
    }

    // ── Render everything ────────────────────────────────────
    function renderAll() {
      const grid = document.getElementById('lineup-grid');
      grid.innerHTML = '';
      POSITIONS.forEach(slot => {
        if ((rosterSettings[slot] || 0) > 0) {
          grid.appendChild(renderSlotCard(slot));
        }
      });
      renderPicksBar();
    }

    // ── Save lineup ──────────────────────────────────────────
 // ── Save lineup ──────────────────────────────────────────
    async function saveLineup() {
      const saveBtn = document.getElementById('save-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      try {
        // ── Read the current round from system_settings ──
        let currentRound = 'Offseason';
        try {
          const { data: roundRow } = await sb
            .from('system_settings')
            .select('value')
            .eq('key', 'current_round_label')
            .maybeSingle();
          if (roundRow?.value) currentRound = roundRow.value;
        } catch (e) {
          console.warn('Could not read current round, defaulting to Offseason', e);
        }

        // Build rows to insert, stamped with the current round
        const rows = [];
        POSITIONS.forEach(slot => {
          const qty = rosterSettings[slot] || 1;
          if (qty > 1) {
            (picks[slot] || []).forEach(pid => {
              rows.push({ team_id: teamId, slot, player_id: pid, round_label: currentRound });
            });
          } else if (picks[slot]) {
            rows.push({ team_id: teamId, slot, player_id: picks[slot], round_label: currentRound });
          }
        });

        if (!rows.length) {
          alert('Please select at least one player!');
          return;
        }

        // Delete only THIS round's existing picks for this team, then insert fresh.
        // Picks from previous rounds stay locked in.
        const { error: delErr } = await sb
          .from('one_and_done_picks')
          .delete()
          .eq('team_id', teamId)
          .eq('round_label', currentRound);

        if (delErr) throw delErr;

        const { error: insErr } = await sb
          .from('one_and_done_picks')
          .insert(rows);

        if (insErr) throw insErr;

        // Send confirmation email
        try {
          const { data: { session } } = await sb.auth.getSession();
          if (session) {
            await fetch(`${window.SUPABASE_URL}/functions/v1/send-pick-confirmation`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${session.access_token}`
              },
              body: JSON.stringify({
                entry_id: teamId,
                window_id: null
              })
            });
          }
        } catch(e) {
          console.warn('Email send failed:', e);
        }

        alert('✅ Lineup saved!');
      } catch(e) {
        alert('Save failed: ' + e.message);
        console.error(e);
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Lineup';
      }
    }

    // ── Wire up ──────────────────────────────────────────────
    document.getElementById('save-btn').addEventListener('click', saveLineup);
    document.getElementById('clear-all-btn').addEventListener('click', () => {
      picks = {};
      renderAll();
    });
    document.getElementById('player-search').addEventListener('input', renderAll);

    // ── Initial render ───────────────────────────────────────
    renderAll();

  })();
  </script>
</body>
</html>
